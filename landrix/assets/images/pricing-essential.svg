<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d">
  <title id="t">Essential Pricing Plan</title>
  <desc id="d">Illustration representing the entry pricing package.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="210" cy="110" r="68" fill="#10b981" opacity=".15"/>
  <circle cx="1060" cy="620" r="120" fill="#0ea5e9" opacity=".14"/>
  <rect x="210" y="140" width="780" height="430" rx="42" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  <rect x="210" y="140" width="780" height="120" rx="42" fill="url(#card)"/>
